name: Build EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install pandas
          pip install openpyxl

      - name: Build exe
        run: |
          pyinstaller ^
          --onefile ^
          --windowed ^
          --name 地址解析工具 ^
          openpyxl.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 地址解析工具
          path: dist/地址解析工具.exe
