name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' 

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl pyinstaller

    - name: 解决文件名冲突并打包
      # 1. 把 openpyxl.py 重命名为 app.py，防止和第三方库 openpyxl 名字冲突导致报错
      # 2. 使用 --name 指定最终生成的 exe 名字，你可以随意修改这里的中文名（建议不加双引号）
      run: |
        Rename-Item -Path "openpyxl.py" -NewName "app.py"
        pyinstaller --onefile --name "表格处理程序" app.py

    - name: 上传 EXE 到 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Excel_Processor_EXE
        path: dist/*.exe
        retention-days: 7
